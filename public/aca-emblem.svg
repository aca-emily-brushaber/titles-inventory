<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="starClip">
      <polygon points="32,7 39.5,22 56,22 42.5,32 47.5,47 32,37 16.5,47 21.5,32 8,22 24.5,22"/>
    </clipPath>
  </defs>

  <!-- Outer red ring -->
  <circle cx="32" cy="32" r="32" fill="#C2002F"/>
  <!-- White ring -->
  <circle cx="32" cy="32" r="28.5" fill="#FFFFFF"/>
  <!-- Navy inner circle -->
  <circle cx="32" cy="32" r="26" fill="#002855"/>

  <!-- White star outline -->
  <polygon points="32,7 39.5,22 56,22 42.5,32 47.5,47 32,37 16.5,47 21.5,32 8,22 24.5,22"
    fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Red horizontal stripes clipped to star shape -->
  <g clip-path="url(#starClip)">
    <rect x="6" y="20" width="52" height="3.2" fill="#C2002F"/>
    <rect x="6" y="26.2" width="52" height="3.2" fill="#C2002F"/>
    <rect x="6" y="32.4" width="52" height="3.2" fill="#C2002F"/>
  </g>

  <!-- Stylized italic A -->
  <text x="32" y="37.5" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
    font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle"
    letter-spacing="-1">A</text>
</svg>
